<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed - SheMakers</title>
  <meta name="description" content="Reels-style product feed on SheMakers.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" fill="#003049"/>
          <path d="M10 20c0-4 3-7 6-7s6 3 6 7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="11" r="3" fill="#fff"/>
        </svg>
        SheMakers
      </a>

      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="feed.html" class="active">Feed</a>
        <div id="navAuth" style="display:flex;gap:12px;align-items:center;">
          <a href="login.html" class="btn btn-outline btn-sm">Log In</a>
          <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
        <div id="navUser" style="display:none;gap:12px;align-items:center;">
          <a href="dashboard.html" class="nav-dash-link" style="display:none;">Dashboard</a>
          <a href="profile.html" class="nav-profile-link" aria-label="Open profile">
            <span class="nav-profile-avatar">
              <img class="nav-profile-avatar-image" alt="Profile" style="display:none;">
              <span class="nav-profile-avatar-initial">U</span>
            </span>
          </a>
        </div>
      </div>

      <div class="nav-hamburger" id="navToggle">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <main class="feed-container">
    <div id="reelsFeed" class="feed-scroll reels-mode">
      <div id="reelsLoading" class="spinner-overlay" style="min-height:calc(100vh - var(--nav-height));">
        <div class="spinner"></div>
        <p class="spinner-text">Loading feed...</p>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const feedEl = document.getElementById('reelsFeed');

      try {
        await Products.seedDemoProducts(60);
        const products = await Products.getAllProducts();

        if (!products.length) {
          App.showEmpty(feedEl, 'No products yet', 'Add products to start scrolling the feed.');
          return;
        }

        feedEl.innerHTML = '';

        for (const product of products) {
          const sellerInfo = await Products.getSellerInfo(product.userId);
          const sellerName = sellerInfo ? sellerInfo.name : 'Unknown Seller';
          const isVideo = product.mediaType === 'video';
          const category = detectCategory(product.title, product.description);
          const detailUrl = `product.html?id=${product.id}`;
          const orderUrl = Products.getWhatsAppLink(product.whatsapp, product.title, product.price);

          const item = document.createElement('section');
          item.className = 'feed-item';
          item.innerHTML = `
            <article class="feed-reel animate-in">
              <a href="${detailUrl}" class="reel-media" aria-label="Open product details">
                ${isVideo
                  ? `<video src="${product.mediaUrl}" muted loop playsinline preload="metadata"></video>`
                  : `<img src="${product.mediaUrl}" alt="${product.title}" loading="lazy">`
                }
              </a>

              <div class="reel-overlay">
                <div class="reel-top">
                  <span class="card-chip accent">${category}</span>
                  <span class="card-chip">${isVideo ? 'Video Reel' : 'Photo Reel'}</span>
                </div>

                <div class="reel-bottom">
                  <h2 class="reel-title">${product.title}</h2>
                  <div class="reel-price">${App.formatPrice(product.price)}</div>
                  <div class="reel-seller">by ${sellerName} · ${getUrgencyLabel(product.createdAt)}</div>
                  <div class="reel-actions">
                    <a class="reel-btn" href="${detailUrl}">View Details</a>
                    <a class="reel-btn primary" href="${orderUrl}" target="_blank" rel="noopener">Order on WhatsApp</a>
                  </div>
                  <div class="reel-hint">Tap media to open full product page.</div>
                </div>
              </div>
            </article>
          `;

          feedEl.appendChild(item);
        }

        App.initAnimations();
        setupReelVideoBehavior(feedEl);
      } catch (err) {
        console.error(err);
        App.showToast('Failed to load feed', 'error');
      }
    });

    function setupReelVideoBehavior(feedEl) {
      const videos = feedEl.querySelectorAll('.feed-reel video');
      if (!videos.length) return;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target;
          if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
            video.play().catch(() => {});
          } else {
            video.pause();
          }
        });
      }, { threshold: [0.1, 0.6, 0.9] });

      videos.forEach(video => observer.observe(video));
    }

    function detectCategory(title, description) {
      const text = `${title || ''} ${description || ''}`.toLowerCase();
      if (/bag|tote|sling|purse/.test(text)) return 'Bags';
      if (/scarf|dupatta|stole|cloth|fabric/.test(text)) return 'Textiles';
      if (/candle|aroma|fragrance|soap/.test(text)) return 'Self Care';
      if (/cup|plate|pottery|clay|ceramic/.test(text)) return 'Homeware';
      if (/earring|jewel|necklace|bead/.test(text)) return 'Accessories';
      return 'Handmade';
    }

    function getUrgencyLabel(createdAt) {
      const created = createdAt ? new Date(createdAt).getTime() : Date.now();
      const hours = Math.max(1, Math.floor((Date.now() - created) / 3600000));
      if (hours <= 24) return 'Fresh Drop';
      if (hours <= 72) return 'Trending';
      return 'Limited Stock';
    }
  </script>
</body>
</html>
