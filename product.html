<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — SheMakers</title>
  <meta name="description" content="View product details and order via WhatsApp on SheMakers.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" fill="#003049"/>
          <path d="M10 20c0-4 3-7 6-7s6 3 6 7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="11" r="3" fill="#fff"/>
        </svg>
        SheMakers
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="feed.html">Feed</a>
        <div id="navAuth" style="display:flex;gap:12px;align-items:center;">
          <a href="login.html" class="btn btn-outline btn-sm">Log In</a>
          <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
        <div id="navUser" style="display:none;gap:12px;align-items:center;">
          <a href="dashboard.html" class="nav-dash-link" style="display:none;">Dashboard</a>
          <a href="profile.html" class="nav-profile-link" aria-label="Open profile">
            <span class="nav-profile-avatar">
              <img class="nav-profile-avatar-image" alt="Profile" style="display:none;">
              <span class="nav-profile-avatar-initial">U</span>
            </span>
          </a>
        </div>
      </div>
      <div class="nav-hamburger" id="navToggle">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Product Detail -->
  <main class="product-page container" id="productContainer">
    <!-- Rendered by JS -->
  </main>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('productContainer');
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      if (!productId) {
        App.showEmpty(container, 'Product not found', 'The link may be broken.');
        return;
      }

      App.showSpinner(container);

      try {
        const product = await Products.getProduct(productId);
        const seller = await Products.getSellerInfo(product.userId);
        const sellerName = seller ? seller.name : 'Unknown Seller';
        const initial = sellerName.charAt(0).toUpperCase();
        const isVideo = product.mediaType === 'video';
        const waLink = Products.getWhatsAppLink(product.whatsapp, product.title, product.price);

        document.title = `${product.title} — SheMakers`;

        container.innerHTML = `
          <div class="product-detail" style="animation: fadeSlideUp 0.5s ease forwards;">
            <div class="product-media" id="productMediaWrap">
              <div class="media-loading" id="mediaLoading">
                <div class="media-loading-dot"></div>
                <span>${isVideo ? 'Preparing video...' : 'Loading image...'}</span>
              </div>
              ${isVideo
                ? `
                  <button class="media-play-btn" id="mediaPlayBtn" type="button" aria-label="Play video">
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5.14v13.72c0 .78.85 1.26 1.52.86l10.2-6.86a1 1 0 000-1.72L9.52 4.28A1 1 0 008 5.14z"/></svg>
                  </button>
                  <video id="productVideo" src="${product.mediaUrl}" controls playsinline preload="metadata"></video>
                `
                : `<img id="productImage" src="${product.mediaUrl}" alt="${product.title}">`
              }
            </div>
            <div class="product-info">
              <div>
                <span class="badge">Handmade</span>
              </div>
              <h1>${product.title}</h1>
              <div class="product-price-tag">${App.formatPrice(product.price)}</div>

              ${product.description ? `<p class="product-description">${product.description}</p>` : ''}

              <a href="profile.html?id=${product.userId}" class="product-seller-card">
                <div class="seller-avatar-lg">${initial}</div>
                <div class="seller-detail">
                  <div class="seller-name">${sellerName}</div>
                  <div class="seller-label">View seller profile →</div>
                </div>
              </a>

              <a href="${waLink}" target="_blank" rel="noopener" class="btn btn-whatsapp btn-lg" style="width:100%;margin-top:var(--space-4);">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.118.553 4.107 1.518 5.833L0 24l6.336-1.484A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.82c-1.977 0-3.856-.53-5.508-1.49l-.396-.233-3.76.882.948-3.644-.258-.41A9.78 9.78 0 012.18 12C2.18 6.58 6.58 2.18 12 2.18S21.82 6.58 21.82 12 17.42 21.82 12 21.82z"/></svg>
                Order on WhatsApp
              </a>

              <a href="index.html" class="btn btn-outline" style="width:100%;margin-top:var(--space-2);">
                ← Back to Feed
              </a>
            </div>
          </div>
        `;

        initializeMediaUX(isVideo);

      } catch (err) {
        console.error(err);
        App.showEmpty(container, 'Product not found', 'This product may have been removed.');
      }
    });

    function initializeMediaUX(isVideo) {
      const mediaWrap = document.getElementById('productMediaWrap');
      const mediaLoading = document.getElementById('mediaLoading');
      if (!mediaWrap) return;

      const markLoaded = () => {
        mediaWrap.classList.add('is-loaded');
        if (mediaLoading) mediaLoading.setAttribute('aria-hidden', 'true');
      };

      if (!isVideo) {
        const img = document.getElementById('productImage');
        if (!img) return;

        if (img.complete) {
          markLoaded();
        } else {
          img.addEventListener('load', markLoaded, { once: true });
          img.addEventListener('error', () => {
            if (mediaLoading) mediaLoading.innerHTML = '<span>Unable to load image</span>';
          }, { once: true });
        }
        return;
      }

      const video = document.getElementById('productVideo');
      const playBtn = document.getElementById('mediaPlayBtn');
      if (!video || !playBtn) return;

      const showPlay = () => playBtn.classList.remove('hidden');
      const hidePlay = () => playBtn.classList.add('hidden');

      const startPlayback = async () => {
        try {
          await video.play();
          mediaWrap.classList.add('is-playing');
          hidePlay();
        } catch (e) {
          App.showToast('Tap play once to start video', 'info');
        }
      };

      const onReady = () => {
        markLoaded();
        showPlay();
      };

      if (video.readyState >= 2) {
        onReady();
      } else {
        video.addEventListener('loadeddata', onReady, { once: true });
        video.addEventListener('canplay', onReady, { once: true });
      }

      video.addEventListener('play', () => {
        mediaWrap.classList.add('is-playing');
        hidePlay();
      });

      video.addEventListener('pause', () => {
        mediaWrap.classList.remove('is-playing');
        showPlay();
      });

      video.addEventListener('ended', () => {
        mediaWrap.classList.remove('is-playing');
        showPlay();
      });

      video.addEventListener('error', () => {
        mediaWrap.classList.remove('is-playing');
        if (mediaLoading) mediaLoading.innerHTML = '<span>Unable to load video</span>';
        showPlay();
      }, { once: true });

      playBtn.addEventListener('click', startPlayback);
      video.addEventListener('click', () => {
        if (video.paused) {
          startPlayback();
        } else {
          video.pause();
        }
      });
    }
  </script>
</body>
</html>
