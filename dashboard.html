<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard — SheMakers</title>
  <meta name="description" content="Manage your handmade products on SheMakers. Add, edit, and delete your listings.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" fill="#003049"/>
          <path d="M10 20c0-4 3-7 6-7s6 3 6 7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="11" r="3" fill="#fff"/>
        </svg>
        SheMakers
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="feed.html">Feed</a>
        <div id="navAuth" style="display:flex;gap:12px;align-items:center;">
          <a href="login.html" class="btn btn-outline btn-sm">Log In</a>
        </div>
        <div id="navUser" style="display:none;gap:12px;align-items:center;">
          <a href="dashboard.html" class="nav-dash-link active">Dashboard</a>
          <a href="profile.html" class="nav-profile-link" aria-label="Open profile">
            <span class="nav-profile-avatar">
              <img class="nav-profile-avatar-image" alt="Profile" style="display:none;">
              <span class="nav-profile-avatar-initial">U</span>
            </span>
          </a>
        </div>
      </div>
      <div class="nav-hamburger" id="navToggle">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Dashboard Content -->
  <main class="dashboard-page container">
    <div class="dashboard-header">
      <div>
        <h1>My Dashboard</h1>
        <p style="color:rgba(236,244,249,0.9);font-size:var(--text-sm);margin-top:var(--space-1);" id="welcomeText">Welcome back!</p>
      </div>
      <button class="btn btn-primary" id="addProductBtn" onclick="openAddModal()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add Product
      </button>
    </div>

    <!-- Stats -->
    <div class="dashboard-stats" id="dashStats">
      <div class="stat-card">
        <div class="stat-value" id="statProducts">0</div>
        <div class="stat-label">Total Products</div>
      </div>
    </div>

    <!-- Products Grid -->
    <h2 style="font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-6);">Your Products</h2>
    <div class="products-grid" id="productsGrid">
      <!-- Rendered by JS -->
    </div>
  </main>

  <!-- Add / Edit Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Product</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <form class="modal-form" id="productForm" onsubmit="return false;">
        <!-- Upload Area -->
        <div class="form-group">
          <label class="form-label">Product Image / Video</label>
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="6" y="10" width="36" height="28" rx="4"/>
              <path d="M6 32l10-10 8 8 6-6 12 12"/>
              <circle cx="18" cy="20" r="3"/>
            </svg>
            <p>Click to upload an image or video</p>
            <p class="upload-name" id="uploadName" style="display:none;"></p>
          </div>
          <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;" onchange="handleFileSelect(this)">
        </div>

        <div class="form-group">
          <label class="form-label" for="titleInput">Product Title</label>
          <input class="form-input" type="text" id="titleInput" placeholder="e.g. Homemade Millet Cookies" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="descInput">Description</label>
          <textarea class="form-input" id="descInput" placeholder="Describe material, handmade process, finish, and usage..." rows="3"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="categoryInput">Handmade Category</label>
          <select class="form-input" id="categoryInput" required>
            <option value="">Select category</option>
            <option value="homemade-food">Homemade Food</option>
            <option value="handmade-art">Handmade Art</option>
            <option value="painting-illustration">Painting & Illustration</option>
            <option value="crafts-decor">Crafts & Decor</option>
            <option value="accessories-fashion">Accessories & Fashion</option>
            <option value="home-essentials">Home Essentials</option>
            <option value="gifting">Gifting</option>
            <option value="other-handmade">Other Handmade</option>
          </select>
        </div>

        <div class="form-group" style="background:var(--gray-100);border:1px solid var(--gray-200);padding:12px;border-radius:10px;">
          <p style="font-size:var(--text-sm);color:var(--gray-700);line-height:1.5;">
            Allowed: women-made handmade products only. Not allowed: entertainment videos, vlogs, lifestyle clips, gaming, comedy, travel content.
          </p>
        </div>

        <div class="form-group">
          <label class="form-label" for="priceInput">Price (₹)</label>
          <input class="form-input" type="number" id="priceInput" placeholder="e.g. 499" min="1" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="whatsappInput">WhatsApp Number</label>
          <input class="form-input" type="tel" id="whatsappInput" placeholder="e.g. 919876543210 (with country code)" required>
        </div>

        <button class="btn btn-primary btn-lg" type="submit" id="submitBtn" style="width:100%;">
          Add Product
        </button>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    let currentUser = null;
    let editingProductId = null;
    let selectedFile = null;

    // ---------- Init ----------
    document.addEventListener('DOMContentLoaded', () => {
      currentUser = Auth.requireAuth('seller');
      if (!currentUser) return;

      document.getElementById('welcomeText').textContent = `Welcome back, ${currentUser.name}!`;
      loadProducts();
    });

    // ---------- Load Products ----------
    async function loadProducts() {
      const grid = document.getElementById('productsGrid');
      App.showSpinner(grid);

      try {
        const products = await Products.getSellerProducts(currentUser.id);
        document.getElementById('statProducts').textContent = products.length;

        if (!products.length) {
          App.showEmpty(grid, 'No products yet', 'Click "Add Product" to list your first creation!');
          return;
        }

        grid.innerHTML = '';
        products.forEach(product => {
          const isVideo = product.mediaType === 'video';
          const card = document.createElement('div');
          card.className = 'card animate-in';
          card.innerHTML = `
            <div class="card-media">
              ${isVideo
                ? `<video src="${product.mediaUrl}" autoplay muted loop playsinline preload="metadata"></video>`
                : `<img src="${product.mediaUrl}" alt="${product.title}" loading="lazy">`
              }
            </div>
            <div class="card-body">
              <div class="card-title">${product.title}</div>
              <div class="card-price">${App.formatPrice(product.price)}</div>
              ${product.category ? `<p style="font-size:var(--text-xs);font-weight:700;color:var(--primary);text-transform:capitalize;margin-bottom:var(--space-2);">${product.category.replace('-', ' ')}</p>` : ''}
              ${product.description ? `<p style="font-size:var(--text-sm);color:var(--gray-500);margin-bottom:var(--space-3);line-height:1.5;">${product.description}</p>` : ''}
              <div class="card-actions">
                <button class="btn btn-secondary btn-sm" onclick="openEditModal('${product.id}')" style="flex:1;">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  Edit
                </button>
                <button class="btn btn-danger btn-sm" onclick="handleDelete('${product.id}')" style="flex:1;">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                  Delete
                </button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

        App.initAnimations();
      } catch (err) {
        console.error(err);
        App.showToast('Failed to load products', 'error');
      }
    }

    // ---------- File Selection ----------
    function handleFileSelect(input) {
      const file = input.files[0];
      if (!file) return;

      selectedFile = file;
      const area = document.getElementById('uploadArea');
      const nameEl = document.getElementById('uploadName');
      area.classList.add('has-file');
      nameEl.textContent = file.name;
      nameEl.style.display = 'block';

      // Show preview
      const existingPreview = area.querySelector('.upload-preview');
      if (existingPreview) existingPreview.remove();

      if (file.type.startsWith('image')) {
        const img = document.createElement('img');
        img.className = 'upload-preview';
        img.src = URL.createObjectURL(file);
        area.appendChild(img);
      }
    }

    // ---------- Modal Controls ----------
    function openAddModal() {
      editingProductId = null;
      selectedFile = null;
      document.getElementById('modalTitle').textContent = 'Add New Product';
      document.getElementById('submitBtn').textContent = 'Add Product';
      document.getElementById('productForm').reset();
      document.getElementById('uploadArea').classList.remove('has-file');
      document.getElementById('uploadName').style.display = 'none';
      const preview = document.querySelector('.upload-preview');
      if (preview) preview.remove();

      // Pre-fill WhatsApp with user phone
      document.getElementById('whatsappInput').value = currentUser.phone;

      document.getElementById('productModal').classList.add('active');
      App.showToast('Only handmade product listings allowed. No vlog/entertainment videos.', 'info');
    }

    async function openEditModal(productId) {
      editingProductId = productId;
      selectedFile = null;
      document.getElementById('modalTitle').textContent = 'Edit Product';
      document.getElementById('submitBtn').textContent = 'Save Changes';

      try {
        const product = await Products.getProduct(productId);
        document.getElementById('titleInput').value = product.title;
        document.getElementById('descInput').value = product.description || '';
        document.getElementById('categoryInput').value = product.category || '';
        document.getElementById('priceInput').value = product.price;
        document.getElementById('whatsappInput').value = product.whatsapp;

        const area = document.getElementById('uploadArea');
        area.classList.add('has-file');
        document.getElementById('uploadName').textContent = 'Current media (click to change)';
        document.getElementById('uploadName').style.display = 'block';

        document.getElementById('productModal').classList.add('active');
      } catch (err) {
        App.showToast(err.message, 'error');
      }
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('active');
    }

    // Close modal on outside click
    document.getElementById('productModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    // ---------- Submit Product ----------
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('titleInput').value.trim();
      const description = document.getElementById('descInput').value.trim();
      const category = document.getElementById('categoryInput').value;
      const price = document.getElementById('priceInput').value;
      const whatsapp = document.getElementById('whatsappInput').value.trim();

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = editingProductId ? 'Saving...' : 'Uploading...';

      try {
        if (editingProductId) {
          // Update
          await Products.updateProduct(editingProductId, {
            title, description, category, price, whatsapp, userId: currentUser.id
          }, selectedFile);
          App.showToast('Product updated!', 'success');
        } else {
          // Add
          if (!selectedFile) {
            App.showToast('Please select an image or video', 'error');
            btn.disabled = false;
            btn.textContent = 'Add Product';
            return;
          }
          await Products.addProduct({
            title, description, category, price, whatsapp,
            file: selectedFile,
            userId: currentUser.id
          });
          App.showToast('Product added successfully!', 'success');
        }

        closeModal();
        loadProducts();
      } catch (err) {
        App.showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = editingProductId ? 'Save Changes' : 'Add Product';
      }
    });

    // ---------- Delete Product ----------
    async function handleDelete(productId) {
      if (!confirm('Are you sure you want to delete this product?')) return;

      try {
        await Products.deleteProduct(productId);
        App.showToast('Product deleted', 'success');
        loadProducts();
      } catch (err) {
        App.showToast(err.message, 'error');
      }
    }
  </script>
</body>
</html>
