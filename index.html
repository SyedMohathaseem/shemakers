<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SheMakers — Handmade by Women, Made with Love</title>
  <meta name="description" content="Discover unique handmade products crafted by talented women makers. Browse, connect, and order directly via WhatsApp.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" fill="#003049"/>
          <path d="M10 20c0-4 3-7 6-7s6 3 6 7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="11" r="3" fill="#fff"/>
        </svg>
        SheMakers
      </a>

      <div class="nav-links" id="navLinks">
        <a href="index.html" class="active">Home</a>
        <a href="feed.html">Feed</a>
        <div id="navAuth" style="display:flex;gap:12px;align-items:center;">
          <a href="login.html" class="btn btn-outline btn-sm">Log In</a>
          <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
        <div id="navUser" style="display:none;gap:12px;align-items:center;">
          <a href="dashboard.html" class="nav-dash-link" style="display:none;">Dashboard</a>
          <a href="profile.html" class="nav-profile-link" aria-label="Open profile">
            <span class="nav-profile-avatar">
              <img class="nav-profile-avatar-image" alt="Profile" style="display:none;">
              <span class="nav-profile-avatar-initial">U</span>
            </span>
          </a>
        </div>
      </div>

      <div class="nav-hamburger" id="navToggle">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <div class="feed-container">
    <section class="hero" id="hero">
      <h1>Handmade by Women,<br>Made with Love ✨</h1>
      <p>Discover unique handcrafted products from talented women creators across India. Support small businesses, one beautiful creation at a time.</p>
      <a href="#feed" class="btn btn-lg" style="background:#fff;color:#003049;box-shadow:0 6px 20px rgba(0,0,0,0.22);">
        Explore Products ↓
      </a>
    </section>

    <!-- Product Feed -->
    <section id="feed">
      <div class="section-header container" style="padding-top:var(--space-8);">
        <h2>✨ Latest Creations</h2>
      </div>
      <div id="productFeed" class="feed-scroll" style="height:auto;">
        <!-- Products rendered by JS -->
      </div>
    </section>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const feedContainer = document.getElementById('productFeed');
      App.showSpinner(feedContainer);

      try {
        await Products.seedDemoProducts(60);
        const products = await Products.getAllProducts();

        if (!products.length) {
          App.showEmpty(feedContainer, 'No products yet', 'Be the first seller to list your creations!');
          return;
        }

        feedContainer.innerHTML = '';

        // Build a grid of cards instead of snap-scroll for browsing
        const grid = document.createElement('div');
        grid.className = 'products-grid feed-grid container';
        grid.style.paddingBottom = 'var(--space-8)';

        for (const product of products) {
          const sellerInfo = await Products.getSellerInfo(product.userId);
          const sellerName = sellerInfo ? sellerInfo.name : 'Unknown Seller';
          const initial = sellerName.charAt(0).toUpperCase();

          const isVideo = product.mediaType === 'video';
          const categoryTag = detectCategory(product.title, product.description);
          const urgencyLabel = getUrgencyLabel(product.createdAt);
          const shortPitch = getShortPitch(product.description, categoryTag);

          const card = document.createElement('div');
          card.className = 'card animate-in';
          card.innerHTML = `
            <a href="product.html?id=${product.id}" class="card-media">
              <div class="card-media-top">
                <span class="card-chip accent">${categoryTag}</span>
                <span class="card-chip">${isVideo ? 'Video Preview' : 'New Arrival'}</span>
              </div>
              ${isVideo
                ? `<video src="${product.mediaUrl}" autoplay muted loop playsinline preload="metadata"></video>`
                : `<img data-src="${product.mediaUrl}" alt="${product.title}" loading="lazy">`
              }
              <div class="card-media-bottom">
                <span class="card-media-price">${App.formatPrice(product.price)}</span>
                <span class="card-media-urgency">${urgencyLabel}</span>
              </div>
            </a>
            <div class="card-body">
              <a href="product.html?id=${product.id}">
                <div class="card-title">${product.title}</div>
              </a>
              <div class="card-subtitle">${shortPitch}</div>
              <a href="profile.html?id=${product.userId}" class="card-seller">
                <span class="card-seller-avatar">${initial}</span>
                ${sellerName}
              </a>
              <div class="card-trust-row">
                <span class="card-trust-pill">Handmade</span>
                <span class="card-trust-pill">Direct Seller</span>
                <span class="card-trust-pill">Quick WhatsApp Reply</span>
              </div>
              <div class="card-actions">
                <a href="${Products.getWhatsAppLink(product.whatsapp, product.title, product.price)}" target="_blank" rel="noopener" class="btn btn-whatsapp btn-sm btn-order-strong" style="flex:1;">
                  <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.118.553 4.107 1.518 5.833L0 24l6.336-1.484A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.82c-1.977 0-3.856-.53-5.508-1.49l-.396-.233-3.76.882.948-3.644-.258-.41A9.78 9.78 0 012.18 12C2.18 6.58 6.58 2.18 12 2.18S21.82 6.58 21.82 12 17.42 21.82 12 21.82z"/></svg>
                  Buy Now on WhatsApp
                </a>
              </div>
            </div>
          `;
          grid.appendChild(card);
        }

        feedContainer.appendChild(grid);
        App.initLazyLoad();
        App.initAnimations();

        // Auto-play videos on hover
        grid.querySelectorAll('video').forEach(video => {
          video.closest('.card-media').addEventListener('mouseenter', () => {
            if (video.src) video.play();
          });
          video.closest('.card-media').addEventListener('mouseleave', () => {
            video.pause();
          });
        });

      } catch (err) {
        console.error(err);
        App.showToast('Failed to load products', 'error');
      }
    });

    function detectCategory(title, description) {
      const text = `${title || ''} ${description || ''}`.toLowerCase();
      if (/bag|tote|sling|purse/.test(text)) return 'Bags';
      if (/scarf|dupatta|stole|cloth|fabric/.test(text)) return 'Textiles';
      if (/candle|aroma|fragrance|soap/.test(text)) return 'Self Care';
      if (/cup|plate|pottery|clay|ceramic/.test(text)) return 'Homeware';
      if (/earring|jewel|necklace|bead/.test(text)) return 'Accessories';
      return 'Handmade';
    }

    function getUrgencyLabel(createdAt) {
      const created = createdAt ? new Date(createdAt).getTime() : Date.now();
      const hours = Math.max(1, Math.floor((Date.now() - created) / 3600000));
      if (hours <= 24) return 'Fresh Drop';
      if (hours <= 72) return 'Trending';
      return 'Limited Stock';
    }

    function getShortPitch(description, category) {
      const desc = (description || '').trim();
      if (desc && desc.length <= 70) return desc;
      if (desc && desc.length > 70) return desc.slice(0, 67) + '...';

      const defaults = {
        Bags: 'Everyday carry with artisan finishing and premium durability.',
        Textiles: 'Soft handcrafted fabric made for standout everyday styling.',
        'Self Care': 'Small-batch crafted product for a soothing daily ritual.',
        Homeware: 'Hand-finished piece that upgrades your table and space.',
        Accessories: 'Statement handmade detail designed to elevate your look.',
        Handmade: 'Crafted by women makers with quality-first finishing.'
      };

      return defaults[category] || defaults.Handmade;
    }
  </script>
</body>
</html>
